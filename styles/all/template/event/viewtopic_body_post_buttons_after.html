{% if postrow.U_RESOLVE %}
	<li>
		<a href="{{ postrow.U_RESOLVE }}" title="{% if postrow.S_POST_RESOLUTION %}{{ lang( 'UNRESOLVE_TOPIC' ) }}{% else %}{{ lang( 'RESOLVE_TOPIC' ) }}{% endif %}" class="button button-icon-only" data-ajax="resolved_topic_api">
			{% if postrow.S_POST_RESOLUTION %}
				<i class="icon fa-minus fa-fw" aria-hidden="true"></i><span class="sr-only">{{ lang( 'UNRESOLVE_TOPIC' ) }}</span>
			{% else %}
				<i class="icon fa-check fa-fw" aria-hidden="true"></i><span class="sr-only">{{ lang( 'RESOLVE_TOPIC' ) }}</span>
			{% endif %}
		</a>
	</li>
{% endif %}
