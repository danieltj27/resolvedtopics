services:
    danieltj.resolvedtopics.controller.api:
        class: danieltj\resolvedtopics\controller\api
        arguments:
            - '@language'
            - '@log'
            - '@notification_manager'
            - '@request'
            - '@user'
            - '@danieltj.resolvedtopics.includes.functions'

    danieltj.resolvedtopics.listener:
        class: danieltj\resolvedtopics\event\listener
        arguments:
            - '@auth'
            - '@language'
            - '@template'
            - '@user'
            - '@danieltj.resolvedtopics.includes.functions'
        tags:
            - { name: event.listener }

    danieltj.resolvedtopics.includes.functions:
        class: danieltj\resolvedtopics\includes\functions
        arguments:
            - '@auth'
            - '@config'
            - '@dbal.conn'
            - '@log'
            - '@notification_manager'
            - '@routing.helper'
            - '@user'

    danieltj.resolvedtopics.notification.type.resolved:
        class: danieltj\resolvedtopics\notification\type\resolved
        parent: notification.type.base
        shared: false
        tags: [ { name: notification.type } ]
        calls:
            - [ 'set_user_loader', [ '@user_loader' ] ]
            - [ 'set_functions', [ '@danieltj.resolvedtopics.includes.functions' ] ]
